<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Teacher Login — Engineering Science Hub</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<nav class="topbar">
  <a href="../index.html" class="logo">
    <div class="logo-mark"><svg viewBox="0 0 20 20" fill="none"><path d="M4 10h12M10 4v12M4 4l12 12M16 4L4 16" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/></svg></div>
    <div class="logo-text"><span class="logo-title">Engineering Science Hub</span><span class="logo-sub">Scotland</span></div>
  </a>
</nav>
<div style="margin-top:var(--topbar-h);">
  <div class="login-wrap">
    <div class="login-card">
      <div style="width:42px;height:42px;border-radius:50%;background:var(--teal-50);display:flex;align-items:center;justify-content:center;margin-bottom:18px;">
        <svg width="20" height="20" viewBox="0 0 16 16" fill="none"><rect x="3" y="7" width="10" height="8" rx="1.5" stroke="#1D9E75" stroke-width="1.3"/><path d="M5.5 7V5a2.5 2.5 0 015 0v2" stroke="#1D9E75" stroke-width="1.3" stroke-linecap="round"/></svg>
      </div>
      <h1 class="login-title">Teacher area</h1>
      <p class="login-sub">Enter the teacher password to access presentations, answer sheets and extension materials.</p>
      <form onsubmit="teacherLogin(event)">
        <label class="login-label" for="teacher-pw">Password</label>
        <input class="login-input" type="password" id="teacher-pw" placeholder="Enter password" autocomplete="current-password">
        <p class="login-error" id="login-error"></p>
        <button class="login-btn" type="submit">Sign in</button>
      </form>
      <p style="margin-top:18px;font-size:12px;color:var(--gray-400);">Not a teacher? <a href="../index.html" style="color:var(--teal-400);text-decoration:none;">Return to pupil resources &rarr;</a></p>
    </div>
  </div>
</div>
<script src="../js/site.js"></script>
</body></html>
